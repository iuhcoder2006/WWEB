<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danh Mục Sách - XP Books</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../CSS/style.css">
</head>

<body>
  <div id="navbar-placeholder"></div>
  <div class="page-title-bar">
    <div class="container">
      <h1 class="fw-bold mb-0 fs-3">Danh Mục Sách</h1>
      <small class="text-muted" id="subtitle">Khám phá hơn 10.000 đầu sách chất lượng</small>
    </div>
  </div>
  <div class="container py-4">
    <div class="row g-4">
      <div class="col-lg-3">
        <div class="card border-0 shadow-sm rounded-3 sticky-top" style="top:76px">
          <div class="card-body filter-sidebar">
            <h6 class="fw-bold mb-3"><i class="bi bi-funnel text-primary"></i> Thể Loại</h6>
            <div class="list-group list-group-flush" id="cat-filter">
              <button class="list-group-item list-group-item-action active" data-cat="Tất cả">
                Tất cả <span class="badge bg-secondary float-end" id="badge-all">0</span>
              </button>
            </div>
            <hr>
            <h6 class="fw-bold mb-3">Bộ Lọc Đặc Biệt</h6>
            <div class="list-group list-group-flush">
              <button class="list-group-item list-group-item-action" data-filter="new" onclick="applyFilter('new')">
                🆕 Sách mới <span class="badge bg-success float-end" id="badge-new">0</span>
              </button>
              <button class="list-group-item list-group-item-action" data-filter="bestseller"
                onclick="applyFilter('bestseller')">
                🔥 Bán chạy <span class="badge bg-danger float-end" id="badge-best">0</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-9">
        <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
          <span class="text-muted small" id="result-count">0 kết quả</span>
          <div class="d-flex gap-2 align-items-center">
            <select class="form-select form-select-sm" id="sort-select" style="width:auto" onchange="renderBooks()">
              <option value="default">Mặc định</option>
              <option value="newest">Mới nhất</option>
              <option value="price-asc">Giá tăng dần</option>
              <option value="price-desc">Giá giảm dần</option>
              <option value="rating">Đánh giá cao</option>
            </select>
            <div class="btn-group btn-group-sm">
              <button class="btn btn-primary" id="btn-grid" onclick="setView('grid')"><i
                  class="bi bi-grid"></i></button>
              <button class="btn btn-outline-secondary" id="btn-list" onclick="setView('list')"><i
                  class="bi bi-list"></i></button>
            </div>
          </div>
        </div>
        <div id="books-grid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4"></div>
        <div id="empty-msg" class="text-center py-5 d-none">
          <div style="font-size:3rem">📚</div>
          <p class="text-muted mt-2">Không tìm thấy sách nào phù hợp</p>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../JavaScript/books.js"></script>
  <script src="../JavaScript/cart.js"></script>
  <script src="../JavaScript/components.js"></script>
  <script>
    renderNavbar('categories');
    renderFooter();

    const params = new URLSearchParams(window.location.search);
    let selectedCat = params.get('cat') || 'Tất cả';
    let specialFilter = params.get('filter') || '';
    let viewMode = 'grid';

    const CATS = ['Tất cả', ...new Set(BOOKS.map(b => b.category))];

    const catFilter = document.getElementById('cat-filter');
    document.getElementById('badge-all').textContent = BOOKS.length;
    document.getElementById('badge-new').textContent = BOOKS.filter(b => b.isNew).length;
    document.getElementById('badge-best').textContent = BOOKS.filter(b => b.isBestSeller).length;

    CATS.slice(1).forEach(cat => {
      const count = BOOKS.filter(b => b.category === cat).length;
      const btn = document.createElement('button');
      btn.className = 'list-group-item list-group-item-action';
      btn.dataset.cat = cat;
      btn.innerHTML = `${cat} <span class="badge bg-secondary float-end">${count}</span>`;
      btn.onclick = () => { selectedCat = cat; specialFilter = ''; renderBooks(); updateActive(); };
      catFilter.appendChild(btn);
    });

    catFilter.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', function () {
        selectedCat = this.dataset.cat;
        specialFilter = '';
        updateActive();
        renderBooks();
      });
    });

    function updateActive() {
      catFilter.querySelectorAll('button').forEach(b => {
        b.classList.toggle('active', b.dataset.cat === selectedCat && !specialFilter);
      });
      document.querySelectorAll('[data-filter]').forEach(b => {
        b.classList.toggle('active', b.dataset.filter === specialFilter);
      });
    }

    function applyFilter(f) {
      specialFilter = f;
      selectedCat = 'Tất cả';
      updateActive();
      renderBooks();
    }

    function setView(mode) {
      viewMode = mode;
      document.getElementById('btn-grid').className = mode === 'grid' ? 'btn btn-primary' : 'btn btn-outline-secondary';
      document.getElementById('btn-list').className = mode === 'list' ? 'btn btn-primary' : 'btn btn-outline-secondary';
      renderBooks();
    }

    function getFiltered() {
      let books = [...BOOKS];
      if (selectedCat !== 'Tất cả') books = books.filter(b => b.category === selectedCat);
      if (specialFilter === 'new') books = books.filter(b => b.isNew);
      if (specialFilter === 'bestseller') books = books.filter(b => b.isBestSeller);
      const sort = document.getElementById('sort-select').value;
      if (sort === 'price-asc') books.sort((a, b) => a.price - b.price);
      if (sort === 'price-desc') books.sort((a, b) => b.price - a.price);
      if (sort === 'rating') books.sort((a, b) => b.rating - a.rating);
      if (sort === 'newest') books.sort((a, b) => new Date(b.addedDate) - new Date(a.addedDate));
      return books;
    }

    function renderBooks() {
      const filtered = getFiltered();
      const grid = document.getElementById('books-grid');
      const empty = document.getElementById('empty-msg');
      document.getElementById('result-count').textContent = `${filtered.length} kết quả`;
      if (filtered.length === 0) { grid.innerHTML = ''; empty.classList.remove('d-none'); return; }
      empty.classList.add('d-none');
      if (viewMode === 'grid') {
        grid.className = 'row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4';
        grid.innerHTML = filtered.map(b => renderBookCard(b)).join('');
      } else {
        grid.className = 'row row-cols-1 g-3';
        grid.innerHTML = filtered.map(b => `
        <div class="col">
          <div class="card border-0 shadow-sm d-flex flex-row overflow-hidden book-card" style="height:130px">
            <img src="${b.cover}" style="width:90px;object-fit:cover" alt="${b.title}">
            <div class="card-body py-2 px-3 d-flex flex-column justify-content-between">
              <div>
                <span class="badge bg-light text-primary" style="font-size:.65rem">${b.category}</span>
                <h6 class="mb-0 mt-1 fw-semibold" style="font-size:.9rem">${b.title}</h6>
                <small class="text-muted">${b.author}</small>
              </div>
              <div class="d-flex align-items-center justify-content-between">
                <span class="fw-bold text-primary">${formatPrice(b.price)}</span>
                <div class="d-flex gap-2 align-items-center">
                  <a href="book-detail.html?id=${b.id}" class="btn btn-sm btn-outline-primary rounded-pill px-3">Xem</a>
                  <button class="btn btn-primary btn-sm rounded-pill px-3" onclick='Cart.addItem(${JSON.stringify({ id: b.id, title: b.title, author: b.author, price: b.price, cover: b.cover })})'>
                    <i class="bi bi-cart-plus"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>`).join('');
      }
    }

    if (specialFilter === 'new') {
      document.getElementById('subtitle').textContent = 'Hiển thị: Sách mới cập nhật';
    }

    updateActive();
    renderBooks();
  </script>
</body>

</html>
