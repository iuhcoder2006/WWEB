<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cửa Hàng Sách - XP Books</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../CSS/style.css">
</head>

<body>

  <div id="navbar-placeholder"></div>

  <div class="page-title-bar">
    <div class="container">
      <h1 class="fw-bold mb-0 fs-3">Cửa Hàng Sách</h1>
      <small class="text-muted">Tìm kiếm và mua sách yêu thích</small>
    </div>
  </div>

  <div class="container py-4">
    <div class="row g-3 mb-4 align-items-center">
      <div class="col-lg-5">
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
          <input type="text" class="form-control search-bar border-start-0 rounded-start-0" id="search-input"
            placeholder="Tìm theo tên sách, tác giả..." oninput="renderBooks()">
          <button class="btn btn-primary" onclick="renderBooks()">Tìm</button>
        </div>
      </div>
      <div class="col-auto">
        <select class="form-select" id="sort-select" onchange="renderBooks()">
          <option value="default">Sắp xếp: Mặc định</option>
          <option value="newest">Mới nhất</option>
          <option value="price-asc">Giá tăng dần</option>
          <option value="price-desc">Giá giảm dần</option>
          <option value="rating">Đánh giá cao</option>
        </select>
      </div>
      <div class="col-auto ms-auto">
        <button class="btn btn-outline-secondary btn-sm" type="button" data-bs-toggle="collapse"
          data-bs-target="#advFilter">
          <i class="bi bi-sliders"></i> Bộ lọc nâng cao
        </button>
      </div>
    </div>

    <div class="collapse mb-3" id="advFilter">
      <div class="card card-body border-0 shadow-sm rounded-3">
        <div class="row g-3">
          <div class="col-md-8">
            <label class="fw-semibold small mb-2">Thể Loại</label>
            <div class="d-flex flex-wrap gap-2" id="cat-chips"></div>
          </div>
          <div class="col-md-4">
            <label class="fw-semibold small mb-2">Giá tối đa: <span id="price-label">300.000đ</span></label>
            <input type="range" class="form-range accent-orange" id="price-range" min="0" max="300000" step="10000"
              value="300000"
              oninput="document.getElementById('price-label').textContent=parseInt(this.value).toLocaleString('vi-VN')+'đ'; renderBooks()">
          </div>
        </div>
      </div>
    </div>

    <div class="d-flex flex-wrap gap-2 mb-3" id="cat-tabs"></div>

    <p class="text-muted small mb-3" id="result-count">Đang tải...</p>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4" id="books-grid"></div>
    <div id="empty-msg" class="text-center py-5 d-none">
      <div style="font-size:3rem">🔍</div>
      <p class="text-muted">Không tìm thấy sách phù hợp</p>
      <button class="btn btn-outline-primary btn-sm" onclick="clearFilters()">Xóa bộ lọc</button>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../JavaScript/books.js"></script>
  <script src="../JavaScript/cart.js"></script>
  <script src="../JavaScript/components.js"></script>
  <script>
    renderNavbar('shop');
    renderFooter();

    const params = new URLSearchParams(window.location.search);
    if (params.get('search')) document.getElementById('search-input').value = params.get('search');

    let selectedCat = 'Tất cả';
    const CATS = ['Tất cả', ...new Set(BOOKS.map(b => b.category))];

    const catTabsEl = document.getElementById('cat-tabs');
    const catChipsEl = document.getElementById('cat-chips');
    CATS.forEach(cat => {
      ['cat-tabs', 'cat-chips'].forEach(id => {
        const btn = document.createElement('button');
        btn.className = `btn btn-sm rounded-pill ${cat === 'Tất cả' ? 'btn-primary' : 'btn-outline-secondary'} cat-btn`;
        btn.dataset.cat = cat;
        btn.textContent = cat;
        btn.onclick = () => {
          selectedCat = cat;
          document.querySelectorAll('.cat-btn').forEach(b => {
            b.className = `btn btn-sm rounded-pill ${b.dataset.cat === cat ? 'btn-primary' : 'btn-outline-secondary'} cat-btn`;
          });
          renderBooks();
        };
        document.getElementById(id).appendChild(btn);
      });
    });

    function getFiltered() {
      const q = document.getElementById('search-input').value.toLowerCase().trim();
      const maxPrice = parseInt(document.getElementById('price-range').value);
      const sort = document.getElementById('sort-select').value;
      let books = [...BOOKS];
      if (q) books = books.filter(b => b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q) || b.category.toLowerCase().includes(q));
      if (selectedCat !== 'Tất cả') books = books.filter(b => b.category === selectedCat);
      books = books.filter(b => b.price <= maxPrice);
      if (sort === 'price-asc') books.sort((a, b) => a.price - b.price);
      if (sort === 'price-desc') books.sort((a, b) => b.price - a.price);
      if (sort === 'rating') books.sort((a, b) => b.rating - a.rating);
      if (sort === 'newest') books.sort((a, b) => new Date(b.addedDate) - new Date(a.addedDate));
      return books;
    }

    function renderBooks() {
      const filtered = getFiltered();
      const grid = document.getElementById('books-grid');
      const empty = document.getElementById('empty-msg');
      document.getElementById('result-count').textContent = `${filtered.length} sản phẩm`;
      if (filtered.length === 0) { grid.innerHTML = ''; empty.classList.remove('d-none'); return; }
      empty.classList.add('d-none');
      grid.innerHTML = filtered.map(b => renderBookCard(b)).join('');
    }

    function clearFilters() {
      document.getElementById('search-input').value = '';
      document.getElementById('price-range').value = 300000;
      document.getElementById('price-label').textContent = '300.000đ';
      selectedCat = 'Tất cả';
      document.querySelectorAll('.cat-btn').forEach(b => {
        b.className = `btn btn-sm rounded-pill ${b.dataset.cat === 'Tất cả' ? 'btn-primary' : 'btn-outline-secondary'} cat-btn`;
      });
      renderBooks();
    }

    renderBooks();
  </script>
</body>

</html>
